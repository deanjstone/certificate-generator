<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Australian VET Certificate Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.2/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.2/vfs_fonts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.15.6/xlsx.full.min.js"></script>
    <script src="app.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      form {
        margin: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1 {
        text-align: center;
      }

      button {
        padding: 10px;
        font-size: 16px;
        background-color: #4caf50;
        color: #fff;
        border: none;
        cursor: pointer;
        margin-top: 10px;
      }

      button:disabled {
        background-color: #9e9e9e;
        cursor: not-allowed;
      }

      .loading-indicator {
        display: none;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Australian VET Certificate Generator</h1>
    <form id="form" role="form" aria-labelledby="form-title">
      <label for="file" id="file-label">Select an xlsx file:</label>
      <input type="file" id="file" name="file" aria-labelledby="file-label" />
      <button type="submit">
        Generate Certificate
      </button>
      <div class="loading-indicator" id="loading-indicator" role="status" aria-live="polite">
        Generating certificate, please wait...
      </div>
    </form>
  </body>
</html>
