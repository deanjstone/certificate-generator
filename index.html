<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Unique Number Generator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <h1>Unique Number Generator</h1>
      <label for="seed">Enter a 7-digit number starting with 8:</label>
      <input type="number" id="seed" min="8000000" max="8999999" required />
      <button id="generate-btn">Generate</button>
      <div class="output-container">
        <label for="output">Generated Number:</label>
        <input type="text" id="output" readonly />
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
