<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Australian VET Certificate Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.20/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.20/vfs_fonts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="src/js/app.js"></script>
    <link rel="stylesheet" href="src/css/style.css">
  </head>
  <body>
    <main class="container">
      <h1 id="form-title">Australian VET Certificate Generator</h1>
      <form id="form" role="form" aria-labelledby="form-title" novalidate>
        <label for="file" id="file-label">Select an xlsx file:</label>
        <input type="file" id="file" name="file" aria-labelledby="file-label" accept=".xlsx,.xls" />
        <button id="generate-button" type="submit">Generate Certificate</button>
        <p class="loading-indicator" id="loading-indicator" role="status" aria-live="polite" hidden></p>
        <p class="error-message" id="error-message" role="alert" hidden></p>
      </form>
    </main>
  </body>
</html>
